<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System Landing Page</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap');

        :root {
            --bg-color: #050810;
            --sun-color: #ffcc00;
            --planet1-color: #A5A5A5; /* Mercury */
            --planet2-color: #e3bb76; /* Venus */
            --planet3-color: #2271b3; /* Earth */
            --orbit-color: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1a2a4a 0%, #050810 70%);
        }

        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: transparent url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/123163/stars.png') repeat top center;
            z-index: 0;
            opacity: 0.5;
        }

        .container {
            position: relative;
            width: 600px;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        .sun {
            position: absolute;
            width: 80px;
            height: 80px;
            background: var(--sun-color);
            border-radius: 50%;
            box-shadow: 0 0 50px var(--sun-color), 0 0 100px #ff6600;
            z-index: 10;
        }

        .orbit {
            position: absolute;
            border: 1px solid var(--orbit-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .planet {
            position: absolute;
            border-radius: 50%;
        }

        /* Orbit 1 - Mercury */
        .orbit-1 {
            width: 180px;
            height: 180px;
            animation: rotate 10s linear infinite;
        }
        .planet-1 {
            width: 12px;
            height: 12px;
            background: var(--planet1-color);
            top: -6px;
            box-shadow: 0 0 10px var(--planet1-color);
        }

        /* Orbit 2 - Venus */
        .orbit-2 {
            width: 300px;
            height: 300px;
            animation: rotate 25s linear infinite;
        }
        .planet-2 {
            width: 20px;
            height: 20px;
            background: var(--planet2-color);
            top: -10px;
            box-shadow: 0 0 15px var(--planet2-color);
        }

        /* Orbit 3 - Earth */
        .orbit-3 {
            width: 450px;
            height: 450px;
            animation: rotate 40s linear infinite;
        }
        .planet-3 {
            width: 22px;
            height: 22px;
            background: var(--planet3-color);
            top: -11px;
            box-shadow: 0 0 20px var(--planet3-color);
            overflow: hidden;
        }
        /* Simple Earth clouds */
        .planet-3::after {
            content: '';
            position: absolute;
            top: 20%;
            left: 10%;
            width: 80%;
            height: 30%;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 40% 60% 70% 30%;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .ui {
            position: absolute;
            bottom: 50px;
            text-align: center;
            z-index: 20;
            width: 100%;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 10px;
            text-transform: uppercase;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        p {
            font-size: 1.2rem;
            color: #aaa;
            letter-spacing: 2px;
        }

        .glass-card {
            position: absolute;
            top: 50px;
            left: 50px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            z-index: 20;
            max-width: 250px;
        }

        .glass-card h2 {
            font-size: 1rem;
            margin-bottom: 10px;
            color: #ffcc00;
        }

        .glass-card p {
            font-size: 0.8rem;
            line-height: 1.5;
            letter-spacing: 0;
            color: #ddd;
        }
    </style>
</head>
<body>
    <div class="stars"></div>

    <div class="glass-card">
        <h2>Mission Dashboard</h2>
        <p>Current exploration of the Inner Planets. Tracking Mercury, Venus, and Earth orbits within the AlmaLinux Hosting Sector.</p>
    </div>

    <div class="container">
        <div class="sun"></div>
        
        <div class="orbit orbit-1">
            <div class="planet planet-1"></div>
        </div>
        
        <div class="orbit orbit-2">
            <div class="planet planet-2"></div>
        </div>
        
        <div class="orbit orbit-3">
            <div class="planet planet-3"></div>
        </div>
    </div>

    <div class="ui">
        <h1>Celestial Host</h1>
        <p>Powered by AlmaLinux & Nginx</p>
    </div>
</body>
</html>
